name: Bitke Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: bitke-deploy
  cancel-in-progress: false

jobs:
  deploy-site:
    name: Deploy public website files to hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Block sensitive files
        shell: bash
        run: |
          set -euo pipefail
          echo "Repoda/deploy paketinde hassas dosya kontrolü yapılıyor..."
          if git ls-files | grep -E '(^muhasebe/storage/|^storage/|\.sqlite($|-)|\.db($|-)|\.zip$|\.tar$|\.tar\.gz$|\.rar$|\.7z$)' ; then
            echo "HATA: storage, sqlite/db, yedek veya zip dosyası repoya girmiş. Deploy durduruldu." >&2
            exit 1
          fi
          echo "Hassas dosya yok. Devam."

      - name: Deploy website files to hosting
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /bitke.com.tr/
          local-dir: ./
          state-name: .ftp-deploy-sync-state-site.json
          timeout: 600000
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            .github/**/*
            muhasebe/**
            muhasebe/**/*
            storage/**
            storage/**/*
            **/*.sqlite
            **/*.sqlite-*
            **/*.db
            **/*.db-*
            **/*.zip
            **/*.tar
            **/*.tar.gz
            **/*.rar
            **/*.7z
            .env
            .env.*
            .ftp-deploy-sync-state*.json
            .DS_Store
            Thumbs.db
