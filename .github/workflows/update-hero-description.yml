name: Update hero description

on:
  push:
    paths:
      - '.github/workflows/update-hero-description.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-copy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update hero description in HTML and JavaScript
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          new_text = (
              "Dumanlar A.Ş. olarak kendi markamız ve modern üretim altyapımızla kaliteli, "
              "planlı ve sürdürülebilir çorap üretimini sunuyoruz. Yıllara dayanan tecrübemizle "
              "sektöre değer katıyoruz."
          )

          index = Path('index.html')
          index_text = index.read_text(encoding='utf-8')
          old_html = (
              "BİTKE, MOFİY ve BAFİY markalarımızla kaliteli, dayanıklı ve modern çorap ürünleri "
              "üretiyor; toptan satış, özel üretim ve marka iş birlikleri için profesyonel çözümler sunuyoruz."
          )
          if old_html not in index_text:
              raise SystemExit('index.html içindeki eski ana sayfa açıklaması bulunamadı')
          index_text = index_text.replace(old_html, new_text, 1)
          index_text = index_text.replace(
              'assets/js/main.js?v=hero-20260711-1',
              'assets/js/main.js?v=hero-text-20260711-1',
              1,
          )
          index.write_text(index_text, encoding='utf-8')

          main_js = Path('assets/js/main.js')
          js_text = main_js.read_text(encoding='utf-8')
          old_js = (
              "BİTKE, MOFİY ve BAFİY markalarımızla toptan satış kanallarına, mağazalara ve özel marka "
              "projelerine uygun; planlı, kaliteli ve sürdürülebilir çorap üretimi sunuyoruz."
          )
          if old_js not in js_text:
              raise SystemExit('assets/js/main.js içindeki eski dinamik açıklama bulunamadı')
          js_text = js_text.replace(old_js, new_text, 1)
          main_js.write_text(js_text, encoding='utf-8')
          PY

          rm -f .github/workflows/update-hero-description.yml

          grep -F "Dumanlar A.Ş. olarak kendi markamız ve modern üretim altyapımızla kaliteli, planlı ve sürdürülebilir çorap üretimini sunuyoruz. Yıllara dayanan tecrübemizle sektöre değer katıyoruz." index.html
          grep -F "Dumanlar A.Ş. olarak kendi markamız ve modern üretim altyapımızla kaliteli, planlı ve sürdürülebilir çorap üretimini sunuyoruz. Yıllara dayanan tecrübemizle sektöre değer katıyoruz." assets/js/main.js
          grep -F "assets/js/main.js?v=hero-text-20260711-1" index.html

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/js/main.js .github/workflows/update-hero-description.yml
          git commit -m "Ana sayfa tanıtım metnini güncelle"
          git push origin main
