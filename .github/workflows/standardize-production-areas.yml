name: Standardize production areas

on:
  push:
    branches:
      - agent/uretim-alanlari-standard

permissions:
  contents: write

jobs:
  update-production-areas:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/uretim-alanlari-standard
          fetch-depth: 0

      - name: Standardize production area labels and links
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          canonical_links = [
              ('erkek-corap.html', 'Erkek Çorabı'),
              ('urunler.html#kadin-corap', 'Kadın Çorabı'),
              ('urunler.html#cocuk-corap', 'Çocuk Çorabı'),
              ('ozel-marka-uretimi.html', 'Markaya Özel Üretim'),
          ]

          main_js = Path('assets/js/main.js')
          text = main_js.read_text(encoding='utf-8')
          premium_pattern = re.compile(
              r'(<section class="footer-premium-col footer-premium-products" aria-label="Üretim alanları">\s*'
              r'<h3>Üretim Alanları</h3>\s*<nav>).*?(</nav>\s*</section>)',
              re.S,
          )
          premium_links = '\n'.join(
              f'              <a href="{href}">{label}</a>' for href, label in canonical_links
          )
          text, premium_count = premium_pattern.subn(
              lambda match: f'{match.group(1)}\n{premium_links}\n            {match.group(2)}',
              text,
          )
          if premium_count != 1:
              raise SystemExit(f'Beklenen dinamik footer alanı bulunamadı: {premium_count}')
          main_js.write_text(text, encoding='utf-8')

          static_pattern = re.compile(
              r'(<div class="footer-links footer-production">\s*'
              r'<h3>Üretim Alanları</h3>\s*<nav[^>]*>).*?(</nav>\s*</div>)',
              re.S,
          )
          static_total = 0
          static_links = '\n'.join(
              f'          <a href="{href}">{label}</a>' for href, label in canonical_links
          )
          for path in Path('.').glob('*.html'):
              html = path.read_text(encoding='utf-8')
              html, count = static_pattern.subn(
                  lambda match: f'{match.group(1)}\n{static_links}\n        {match.group(2)}',
                  html,
              )
              if count:
                  path.write_text(html, encoding='utf-8')
                  static_total += count
          if static_total < 1:
              raise SystemExit('Statik Üretim Alanları footer bölümü bulunamadı.')

          index_path = Path('index.html')
          index = index_path.read_text(encoding='utf-8')
          replacements = {
              '<span class="section-label">Ürün Grupları</span>': '<span class="section-label">Üretim Alanları</span>',
              '<h3>Erkek Çorap</h3>': '<h3>Erkek Çorabı</h3>',
              '<h3>Kadın Çorap</h3>': '<h3>Kadın Çorabı</h3>',
              '<h3>Çocuk Çorap</h3>': '<h3>Çocuk Çorabı</h3>',
              '<h3>Özel Marka Üretimi</h3>': '<h3>Markaya Özel Üretim</h3>',
          }
          for old, new in replacements.items():
              if old not in index:
                  raise SystemExit(f'Index içinde beklenen ifade bulunamadı: {old}')
              index = index.replace(old, new, 1)
          index_path.write_text(index, encoding='utf-8')

          updated_main = main_js.read_text(encoding='utf-8')
          footer_match = premium_pattern.search(updated_main)
          if not footer_match:
              raise SystemExit('Güncellenmiş dinamik footer doğrulanamadı.')
          footer_block = footer_match.group(0)
          for _, label in canonical_links:
              if footer_block.count(label) != 1:
                  raise SystemExit(f'Dinamik footer etiketi eksik veya tekrarlı: {label}')
          for removed in ('Spor Çorap', 'Bambu Çorap', 'Modal Çorap'):
              if removed in footer_block:
                  raise SystemExit(f'Dinamik footer içinde kaldırılması gereken alan kaldı: {removed}')

          updated_index = index_path.read_text(encoding='utf-8')
          for _, label in canonical_links:
              if label not in updated_index:
                  raise SystemExit(f'Ana sayfada üretim alanı eksik: {label}')

          workflow = Path('.github/workflows/standardize-production-areas.yml')
          workflow.unlink()
          PY

      - name: Validate diff
        run: git diff --check

      - name: Commit standardized production areas
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/js/main.js .github/workflows/standardize-production-areas.yml
          git commit -m "Üretim alanlarını dört ana grupta birleştir"
          git push origin agent/uretim-alanlari-standard
