<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" role="img" aria-labelledby="title desc">
  <title id="title">Bafiy Socks Logo</title>
  <desc id="desc">Bafiy markası için renkli serif logotype ve altında SOCKS yazısı</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#071523" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d8b56a"/>
      <stop offset="1" stop-color="#a77a2e"/>
    </linearGradient>
  </defs>
  <rect width="760" height="260" fill="transparent"/>
  <g filter="url(#softShadow)" font-family="Georgia, 'Times New Roman', serif" font-weight="500">
    <text x="78" y="138" font-size="138" letter-spacing="-9">
      <tspan fill="#071523">B</tspan><tspan fill="#c21f32">a</tspan><tspan fill="#0f8795">f</tspan><tspan fill="#94a04a">i</tspan><tspan fill="#f28b18">y</tspan>
    </text>
  </g>
  <text x="126" y="205" font-family="Inter, Arial, sans-serif" font-size="35" font-weight="700" letter-spacing="31" fill="url(#gold)">SOCKS</text>
  <path d="M92 224 H668" stroke="#d8b56a" stroke-width="1.4" stroke-opacity="0.28"/>
</svg>
