<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1981 346" width="1981" height="346" role="img" aria-label="Bitke Mofiy ve Bafiy markaları">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f8fc"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="17%" cy="32%" r="48%">
      <stop offset="0" stop-color="#c99a3f" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#c99a3f" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-25%" y="-35%" width="155%" height="190%">
      <feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#071523" flood-opacity="0.13"/>
    </filter>
    <filter id="blurGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <rect width="1981" height="346" fill="url(#bg)"/>
  <rect width="1981" height="346" fill="url(#glowLeft)"/>
  <path d="M0 344H1981" stroke="#e5e9ef" stroke-width="2"/>

  <g transform="translate(120 44)">
    <text x="0" y="16" fill="#c99a3f" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="5">MARKALARIMIZ</text>

    <g transform="translate(0 64)" filter="url(#shadow)">
      <ellipse cx="182" cy="88" rx="175" ry="56" fill="#c99a3f" opacity="0.13" filter="url(#blurGlow)">
        <animate attributeName="opacity" values="0.09;0.20;0.09" dur="7.2s" repeatCount="indefinite"/>
      </ellipse>
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0; 9 -6; -5 6; 0 0" dur="7.2s" repeatCount="indefinite" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1"/>
        <text x="0" y="86" font-family="Georgia, 'Times New Roman', serif" font-size="104" letter-spacing="-6" dominant-baseline="middle">
          <tspan fill="#bf1d2d">b</tspan><tspan fill="#071523">itke</tspan>
        </text>
        <text x="86" y="152" fill="#c99a3f" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="500" letter-spacing="20">SOCKS</text>
      </g>
    </g>

    <rect x="410" y="76" width="2" height="150" rx="1" fill="#c99a3f" opacity="0.55"/>

    <g transform="translate(485 64)" filter="url(#shadow)">
      <ellipse cx="202" cy="88" rx="185" ry="56" fill="#c99a3f" opacity="0.12" filter="url(#blurGlow)">
        <animate attributeName="opacity" values="0.18;0.09;0.18" dur="7.2s" repeatCount="indefinite"/>
      </ellipse>
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0; -9 6; 5 -6; 0 0" dur="7.2s" begin="-2.1s" repeatCount="indefinite" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1"/>
        <text x="0" y="86" font-family="Georgia, 'Times New Roman', serif" font-size="104" letter-spacing="-4" dominant-baseline="middle">
          <tspan fill="#2fb0c7">M</tspan><tspan fill="#6ab76c">o</tspan><tspan fill="#c99a3f">f</tspan><tspan fill="#f4a11f">i</tspan><tspan fill="#ef5b31">y</tspan>
        </text>
        <text x="86" y="152" fill="#c99a3f" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="500" letter-spacing="20">SOCKS</text>
      </g>
    </g>

    <rect x="900" y="76" width="2" height="150" rx="1" fill="#c99a3f" opacity="0.46"/>

    <g transform="translate(980 64)" filter="url(#shadow)">
      <ellipse cx="198" cy="88" rx="182" ry="56" fill="#c99a3f" opacity="0.12" filter="url(#blurGlow)">
        <animate attributeName="opacity" values="0.10;0.18;0.10" dur="7.2s" begin="-1.2s" repeatCount="indefinite"/>
      </ellipse>
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0; 7 -5; -7 5; 0 0" dur="7.2s" begin="-3.4s" repeatCount="indefinite" calcMode="spline" keySplines=".42 0 .58 1;.42 0 .58 1;.42 0 .58 1"/>
        <text x="0" y="86" font-family="Georgia, 'Times New Roman', serif" font-size="104" letter-spacing="-4" dominant-baseline="middle">
          <tspan fill="#071523">B</tspan><tspan fill="#c99a3f">a</tspan><tspan fill="#2fb0c7">f</tspan><tspan fill="#6ab76c">i</tspan><tspan fill="#ef5b31">y</tspan>
        </text>
        <text x="86" y="152" fill="#c99a3f" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="500" letter-spacing="20">SOCKS</text>
      </g>
    </g>

    <path d="M1420 24C1555 66 1628 145 1640 260" fill="none" stroke="#c99a3f" stroke-width="2" opacity="0.16"/>
    <path d="M1470 7C1605 61 1672 139 1684 244" fill="none" stroke="#071523" stroke-width="2" opacity="0.08"/>
  </g>
